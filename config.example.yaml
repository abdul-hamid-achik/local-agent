# local-agent configuration
# Place at ./local-agent.yaml, $XDG_CONFIG_HOME/local-agent/config.yaml,
# or the fallback $HOME/.config/local-agent/config.yaml (in precedence order).

ollama:
  # Everyday agent model. qwen3.5:2b (~2.7GB) is the smallest that does usable
  # tool calling and is the safe default for 16GB. You CAN switch to qwen3.5:4b
  # (~3.4GB) for more reliable multi-step tool chains — still safe on 16GB.
  #
  # On 16GB, qwen3.5:9b, ornith:latest, and gemma4:e2b are manual EXCLUSIVE
  # profiles: the runtime unloads the prior chat model before switching and the
  # router never auto-selects them. Gemma E4B+ and oversized local weights
  # stay blocked. Ollama Cloud entries come from live inventory; under
  # local-only privacy, explicit selection requires exact conversation consent and
  # they are never chosen by automatic routing.
  model: "qwen3.5:2b"
  base_url: "http://localhost:11434"
  # num_ctx is the KV-cache allocation (NOT the model's 256K max context). It
  # scales linearly with RAM and competes with weights + the embed model.
  # Tuned for a 16GB unified-memory Mac (e.g. M5/16GB):
  #   8192  -> safe everywhere, even alongside a 9B model
  #   16384 -> good default for the 2b/4b tiers (recommended)
  #   32768 -> only on 0.8b/2b with nothing else running
  # Do NOT set 262144 on 16GB: the cache alone would exceed available memory,
  # forcing swap or an OOM kill.
  num_ctx: 16384

# Enforce local-machine-only Ollama and remote MCP endpoints. Approved shell tools
# remain an explicit network-capable boundary until OS sandboxing lands.
privacy:
  local_only: true

# Provider-loop budgets are independent so interactive turns stay concise while
# AUTO has room to inspect, implement, and verify without a premature stop.
tools:
  timeout: 30s
  max_grep_results: 500
  max_iterations: 10
  auto_max_iterations: 40

# Auto-routing uses installed, non-exclusive compact tiers only. Qwen 9B,
# Ornith 9B, and Gemma E2B remain available for an explicit deep-task profile.
model:
  models:
    - name: "qwen3.5:0.8b"   # trivial: routing/classification only — weak at tools
      family: "qwen3.5"
      size: "0.8B"
      capability: "simple"
    - name: "qwen3.5:2b"     # DEFAULT: smallest model with usable tool calling
      family: "qwen3.5"
      size: "2B"
      capability: "medium"
      default: true
    - name: "qwen3.5:4b"     # largest memory-safe tier; reliable multi-step tools
      family: "qwen3.5"
      size: "4B"
      capability: "complex"
    - name: "phi4-mini:latest"
      family: "phi"
      size: "2.5GB"
      capability: "medium"
    - name: "qwen3.5:9b"
      family: "qwen3.5"
      size: "6.6GB"
      capability: "advanced"
      exclusive: true
    - name: "ornith:latest"  # Qwen 3.5-derived 9B coding model; observed Q4 weights
      family: "qwen3.5"
      size: "5.6GB Q4"
      parameters: "9 billion"
      context_size: 262144   # model max; runtime allocation remains ollama.num_ctx
      capability: "advanced"
      exclusive: true
    - name: "gemma4:e2b"
      family: "gemma"
      size: "7.2GB"
      capability: "medium"
      exclusive: true
  default_model: "qwen3.5:2b"
  fallback_chain: ["qwen3.5:2b", "phi4-mini:latest", "qwen3.5:0.8b", "qwen3.5:4b"]
  auto_select: true
  embed_model: "nomic-embed-text"

# Read-only application-level expert consultation. Team, Swarm, and MoE use
# ordinary tool-free Ollama calls; they are not a model-internal/token-level MoE.
# Zero concurrency and fan-out values mean auto. Explicit values are caps only:
# they can reduce work but never force the machine above the measured CPU/RAM
# plan. The runtime serializes work when the accepted model set fits, or reduces
# deterministic fan-out when the complete local weight set does not fit.
experts:
  enabled: true
  max_concurrent_inference: 0
  max_concurrent_distinct_models: 0
  max_team_experts: 0
  max_swarm_workers: 0
  max_moe_experts: 0
  max_eval_tokens: 768
  timeout: 90s

# ICE (Infinite Context Engine) is opt-in. An empty store_path uses the managed
# ~/.config/local-agent/conversations.json default. A non-empty relative value
# is rooted under ~/.config/local-agent/ice/<workspace-hash>; absolute paths
# and `..` escapes are rejected so repository config cannot write elsewhere or
# place private embeddings inside the Git worktree.
ice:
  enabled: false
  # ~137M params / ~0.27GB — co-resides with any chat model for free. Keep it.
  embed_model: "nomic-embed-text"
  # store_path: "conversations.json"

# MCP tool servers. Prefer placing executable STDIO entries in user-wide
# configuration. A repository-local copy of this file must be trusted with the
# exact LOCAL_AGENT_TRUST_REPO_MCP digest printed at startup before any STDIO
# process is spawned; changing the resolved executable or its content, command,
# args, env, exact trust routes, or repository path changes that digest.
servers:
  # Recommended: one lazy MCPHub gateway. It keeps specialist schemas out of
  # small-model context until needed and lets Cortex orchestrate the stack.
  - name: mcphub
    command: mcphub
    args: [mcp, serve, --agent, local-agent]
    # Host-owned exact authority. This is honored only for local STDIO when
    # local_owner exactly matches the executable basename; wrappers, remote
    # transports, MCP annotations, wildcards, and suffix matches cannot widen it.
    # read_only routes are auto-authorized and ledgered as reads.
    # workspace_effectful routes are auto-authorized only in AUTO and only when
    # an explicit `workspace` argument resolves inside the active workspace.
    trust:
      local_owner: mcphub
      gateway: mcphub
      read_only:
        - bob__bob_check
        - bob__bob_inspect
        - bob__bob_plan
        - bob__bob_recipe_describe
        - bob__bob_stats
        - bob__bob_validate_manifest
        - cortex__cortex_handoff
        - cortex__cortex_list_tasks
        - cortex__cortex_metrics
        - cortex__cortex_overview
        - cortex__cortex_read_artifact
        - cortex__cortex_read_evidence
        - cortex__cortex_recall_cases
        - cortex__cortex_sessions
        - cortex__cortex_status
        - cortex__cortex_timeline
        - mcphub_describe_tool
        - mcphub_get_result
        - mcphub_list_servers
        - mcphub_resolve_tool
        - mcphub_search_tools
        - mcphub_stats
      workspace_effectful:
        - cortex__cortex_begin_change
        - cortex__cortex_investigate
        - cortex__cortex_note
        - cortex__cortex_open_task
        - cortex__cortex_plan
        - cortex__cortex_remember
        - cortex__cortex_request_decision
        - cortex__cortex_resolve
        - cortex__cortex_start_task
        - cortex__cortex_verify

    # Omitting trust currently uses a build-owned compatibility profile only
    # for exact mcphub/cortex/bob basenames. Prefer an explicit list. To suppress
    # that migration bridge, configure only: trust: {disabled: true}

  # Direct STDIO transport is also supported when MCPHub is not installed.
  # - name: noted
  #   command: noted
  #   args: [mcp]

  # tinyvault — requires `tvault init` before first use
  # - name: tinyvault
  #   command: tvault
  #   args: [mcp-server]

  # Docker MCP Gateway (requires Docker Desktop with MCP enabled)
  # - name: docker-gateway
  #   command: docker
  #   args: ["mcp", "gateway", "run"]

  # SSE transport
  # - name: remote-server
  #   transport: sse
  #   url: "http://localhost:8811"

  # Streamable HTTP transport
  # - name: streamable-server
  #   transport: streamable-http
