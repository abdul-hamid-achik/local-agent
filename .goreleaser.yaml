version: 2

project_name: local-agent

before:
  hooks:
    - go mod tidy

builds:
  - id: local-agent
    main: ./cmd/local-agent
    binary: local-agent
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: abdul-hamid-achik
    name: local-agent
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"

brews:
  - name: local-agent
    homepage: https://github.com/abdul-hamid-achik/local-agent
    description: "Local AI agent with TUI, powered by Ollama and MCP servers"
    license: MIT
    directory: Formula
    repository:
      owner: abdul-hamid-achik
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    install: |
      bin.install "local-agent"
    test: |
      system "#{bin}/local-agent", "--version"
    skip_upload: "{{ if .Env.HOMEBREW_TAP_TOKEN }}false{{ else }}true{{ end }}"
