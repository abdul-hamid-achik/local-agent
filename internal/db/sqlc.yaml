version: "2"
sql:
  - engine: "sqlite"
    queries: "queries"
    schema: "migrations"
    gen:
      go:
        package: "db"
        out: "."
        emit_json_tags: true
        emit_empty_slices: true
        rename:
          reconciliation_group: SQLCReconciliationGroup
          reconciliation_group_member: SQLCReconciliationGroupMember
          reconciliation_group_resolution: SQLCReconciliationGroupResolution
