name: Verify

on:
  workflow_call:

permissions:
  contents: read

jobs:
  verify:
    name: Go 1.25 verification
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Check module files
        run: go mod tidy -diff

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -count=1 -race

      - name: Run govulncheck
        env:
          GOTOOLCHAIN: local
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

  site:
    name: VitePress site verification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Install site dependencies
        run: npm ci --no-audit --no-fund

      - name: Audit site dependencies
        run: npm audit --audit-level=moderate

      - name: Build site
        run: npm run site:build

      - name: Test rendered internal links
        run: go test ./internal/doclinks -count=1 -args -dist="${GITHUB_WORKSPACE}/docs/.vitepress/dist"

  glyphrun-cli:
    name: Glyphrun deterministic terminal suite
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go for Glyphrun
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26.x'
          # cache: false only disables this action's restore/save hooks. The
          # install step below separately isolates every writable Go path.
          cache: false

      - name: Install pinned Glyphrun
        env:
          GOBIN: ${{ runner.temp }}/glyphrun/bin
          GOPATH: ${{ runner.temp }}/glyphrun/gopath
          GOMODCACHE: ${{ runner.temp }}/glyphrun/gomodcache
          GOCACHE: ${{ runner.temp }}/glyphrun/build-cache
        run: |
          go install github.com/abdul-hamid-achik/glyphrun/cmd/glyph@v0.14.0
          echo "${GOBIN}" >> "${GITHUB_PATH}"

      # Glyphrun currently needs Go 1.26 to build, but the application contract
      # is Go 1.25. Switch back before the specs compile local-agent so the PTY
      # surface is exercised with the same minimum toolchain as releases.
      - name: Set up application Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Verify every Glyphrun contract hash
        run: |
          for spec in specs/*.yml; do
            glyph spec verify "$spec" --format md
          done

      - name: Prebuild application for terminal suite
        run: go build -o ./bin/local-agent ./cmd/local-agent

      - name: Verify complete deterministic terminal suite
        run: |
          set -eu
          set --
          for spec in specs/*.yml; do
            if [ "$spec" = "specs/live_ollama_tool.yml" ]; then
              continue
            fi
            set -- "$@" "$spec"
          done
          test "$#" -gt 0
          glyph run "$@" --format md --progress always --parallel 1

      - name: Upload failed terminal diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: glyphrun-failure-${{ github.run_attempt }}
          path: .glyphrun/runs
          include-hidden-files: true
          retention-days: 3

  darwin-smoke:
    name: Darwin build and POSIX smoke tests
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Build release-compatible binary
        env:
          CGO_ENABLED: 0
        run: go build -trimpath -o "${RUNNER_TEMP}/local-agent" ./cmd/local-agent

      - name: Run binary smoke test
        run: '"${RUNNER_TEMP}/local-agent" --version'

      - name: Run Darwin-sensitive package tests
        run: go test ./cmd/local-agent ./internal/agent ./internal/config ./internal/db ./internal/mcp ./internal/safeio -count=1
