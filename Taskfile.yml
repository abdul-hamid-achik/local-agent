version: '3'

tasks:
  build:
    desc: Build the binary
    cmds:
      - go build -o bin/local-agent ./cmd/local-agent

  run:
    desc: Build and run
    deps: [build]
    cmds:
      - ./bin/local-agent

  dev:
    desc: Run with go run
    cmds:
      - go run ./cmd/local-agent

  'site:deps':
    internal: true
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules/.package-lock.json
    cmds:
      - npm ci --no-audit --no-fund

  site:
    desc: Run the VitePress documentation site locally
    deps: ['site:deps']
    cmds:
      - npm run site

  'site:build':
    desc: Build the VitePress documentation site
    deps: ['site:deps']
    cmds:
      - npm run site:build

  'site:check-links':
    desc: Check internal links in the rendered documentation site
    deps: ['site:build']
    cmds:
      - go test ./internal/doclinks -count=1 -args -dist="{{.ROOT_DIR}}/docs/.vitepress/dist"

  'site:verify':
    desc: Test, build, and check the public documentation site
    deps: ['site:check-links']

  'site:preview':
    desc: Preview the built VitePress documentation site
    deps: ['site:build']
    cmds:
      - npm run site:preview

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run ./...

  test:
    desc: Run tests
    cmds:
      - go test ./...

  sqlc:
    desc: Regenerate typed SQLite query and schema models
    dir: internal/db
    cmds:
      - sqlc generate

  verify:
    desc: Run the local code and documentation verification gates
    deps: ['site:verify']
    cmds:
      - go mod tidy -diff
      - golangci-lint run ./...
      - go vet ./...
      - go test ./... -count=1 -race
      - go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

  glyphrun-cli:
    desc: Run release-critical CLI and external-read contracts with Glyphrun
    cmds:
      - glyph run specs/cli_flags.yml specs/cli_skip_approvals.yml specs/tui_external_read.yml --format md --progress auto --parallel 1

  glyphrun-contracts:
    desc: Verify every committed Glyphrun contract hash
    cmds:
      - |
        set -eu
        for spec in specs/*.yml; do
          glyph spec verify "$spec" --format md
        done

  glyphrun:
    desc: Run every deterministic terminal behavior spec with Glyphrun
    cmds:
      - go build -o ./bin/local-agent ./cmd/local-agent
      - |
        set -eu
        set --
        for spec in specs/*.yml; do
          if [ "$spec" = "specs/live_ollama_tool.yml" ]; then
            continue
          fi
          set -- "$@" "$spec"
        done
        test "$#" -gt 0
        glyph run "$@" --format md --progress auto --parallel 1

  glyphrun-snapshots:
    desc: Refresh committed Glyphrun terminal snapshots
    cmds:
      - glyph snapshot update specs/cli_skip_approvals.yml --format md
      - glyph snapshot update specs/tui_smoke.yml --format md
      - glyph snapshot update specs/tui_modes.yml --format md
      - glyph snapshot update specs/tui_narrow.yml --format md
      - glyph snapshot update specs/tui_goal_runtime.yml --format md
      - glyph snapshot update specs/tui_ollama_inventory.yml --format md
      - glyph snapshot update specs/tui_composer_paste.yml --format md
      - glyph snapshot update specs/tui_approval_denial.yml --format md
      - glyph snapshot update specs/tui_approval_always.yml --format md
      - glyph snapshot update specs/tui_session_receipts.yml --format md
      - glyph snapshot update specs/tui_help.yml --format md

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf bin/
