version: '3'

tasks:
  build:
    desc: Build the binary
    cmds:
      - go build -o bin/local-agent ./cmd/local-agent

  run:
    desc: Build and run
    deps: [build]
    cmds:
      - ./bin/local-agent

  dev:
    desc: Run with go run
    cmds:
      - go run ./cmd/local-agent

  'site:deps':
    internal: true
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules/.package-lock.json
    cmds:
      - npm ci --no-audit --no-fund

  site:
    desc: Run the VitePress documentation site locally
    deps: ['site:deps']
    cmds:
      - npm run site

  'site:build':
    desc: Build the VitePress documentation site
    deps: ['site:deps']
    cmds:
      - npm run site:build

  'site:preview':
    desc: Preview the built VitePress documentation site
    deps: ['site:build']
    cmds:
      - npm run site:preview

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run ./...

  test:
    desc: Run tests
    cmds:
      - go test ./...

  verify:
    desc: Run the same verification gates as CI
    deps: ['site:build']
    cmds:
      - go mod tidy -diff
      - golangci-lint run ./...
      - go vet ./...
      - go test ./... -count=1 -race
      - go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

  glyphrun:
    desc: Run terminal behavior specs with Glyphrun
    cmds:
      - glyph run specs/version.yml specs/tui_smoke.yml specs/tui_modes.yml specs/tui_narrow.yml specs/tui_goal_runtime.yml specs/tui_ollama_inventory.yml specs/tui_composer_paste.yml specs/tui_approval_denial.yml specs/tui_approval_always.yml specs/tui_session_receipts.yml specs/help.yml specs/logs_empty.yml specs/init.yml specs/tui_help.yml --format md --progress auto --parallel 1

  glyphrun-snapshots:
    desc: Refresh committed Glyphrun terminal snapshots
    cmds:
      - glyph snapshot update specs/tui_smoke.yml --format md
      - glyph snapshot update specs/tui_modes.yml --format md
      - glyph snapshot update specs/tui_narrow.yml --format md
      - glyph snapshot update specs/tui_goal_runtime.yml --format md
      - glyph snapshot update specs/tui_ollama_inventory.yml --format md
      - glyph snapshot update specs/tui_composer_paste.yml --format md
      - glyph snapshot update specs/tui_approval_denial.yml --format md
      - glyph snapshot update specs/tui_session_receipts.yml --format md
      - glyph snapshot update specs/tui_help.yml --format md

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf bin/
