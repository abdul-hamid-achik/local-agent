version: '3'

tasks:
  build:
    desc: Build the binary
    cmds:
      - go build -o bin/local-agent ./cmd/local-agent

  run:
    desc: Build and run
    deps: [build]
    cmds:
      - ./bin/local-agent

  dev:
    desc: Run with go run
    cmds:
      - go run ./cmd/local-agent

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run ./...

  test:
    desc: Run tests
    cmds:
      - go test ./...

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf bin/
