version: '3'

tasks:
  build:
    desc: Build the binary
    cmds:
      - go build -o bin/local-agent ./cmd/local-agent

  run:
    desc: Build and run
    deps: [build]
    cmds:
      - ./bin/local-agent

  dev:
    desc: Run with go run
    cmds:
      - go run ./cmd/local-agent

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run ./...

  test:
    desc: Run tests
    cmds:
      - go test ./...

  verify:
    desc: Run the same verification gates as CI
    cmds:
      - go mod tidy -diff
      - golangci-lint run ./...
      - go vet ./...
      - go test ./... -count=1 -race
      - go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

  glyphrun:
    desc: Run terminal behavior specs with Glyphrun
    cmds:
      - glyph run specs/glyphrun/version.yml specs/glyphrun/tui_smoke.yml specs/glyphrun/tui_narrow.yml specs/glyphrun/tui_session_receipts.yml specs/glyphrun/help.yml specs/glyphrun/logs_empty.yml specs/glyphrun/init.yml specs/glyphrun/tui_help.yml --format md --progress auto --parallel 1

  glyphrun-snapshots:
    desc: Refresh committed Glyphrun terminal snapshots
    cmds:
      - glyph snapshot update specs/glyphrun/tui_smoke.yml --format md
      - glyph snapshot update specs/glyphrun/tui_narrow.yml --format md
      - glyph snapshot update specs/glyphrun/tui_session_receipts.yml --format md
      - glyph snapshot update specs/glyphrun/tui_help.yml --format md

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf bin/
