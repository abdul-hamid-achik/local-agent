version: 1
contractHash: sha256:7481bd59fcaa34fb105fec1cfc22e2ea3c479435ac6e93b57a2403446f85cda6
name: local_agent_tui_ollama_inventory

intent: |
  the model surface is driven by Ollama's mixed inventory, distinguishes the
  local/cloud privacy boundary, exposes runtime details, and provides a
  cancellable Charm download flow that refreshes inventory on success.

target:
  cmd: ["${projectRoot}/.glyphrun/tmp/fake-ollama-inventory", "${projectRoot}/bin/local-agent"]
  cwd: ".glyphrun/tmp/ollama-inventory-workdir"
  env:
    HOME: "${projectRoot}/.glyphrun/tmp/ollama-inventory-home"
    LOCAL_AGENT_AGENTS_DIR: "${projectRoot}/.glyphrun/tmp/ollama-inventory-agents"
    LOCAL_AGENT_REDUCED_MOTION: "1"

terminal:
  cols: 90
  rows: 28

preconditions:
  commands:
    - run: "rm -rf .glyphrun/tmp/ollama-inventory-home .glyphrun/tmp/ollama-inventory-agents .glyphrun/tmp/ollama-inventory-workdir && mkdir -p .glyphrun/tmp/ollama-inventory-home/.config/local-agent .glyphrun/tmp/ollama-inventory-agents .glyphrun/tmp/ollama-inventory-workdir && printf '%s\n' 'model:' '  auto_select: false' > .glyphrun/tmp/ollama-inventory-home/.config/local-agent/config.yaml && go build -o .glyphrun/tmp/fake-ollama-inventory ./specs/fixtures/fake_ollama_inventory && go build -o ./bin/local-agent ./cmd/local-agent"
      cwd: "."
      timeoutMs: 30000

steps:
  - wait:
      screen:
        contains: "Ask, @mention files, or type /help"
      timeoutMs: 5000
  - type: "/model"
  - wait:
      screen:
        contains: "Filter › model"
      timeoutMs: 2000
  - press: "esc"
  - wait:
      screen:
        notContains: "Commands"
      timeoutMs: 2000
  - press: "enter"
  - wait:
      screen:
        contains: "Ollama 0.31.2-test · models"
      timeoutMs: 3000
  - wait:
      screen:
        contains: "LOCAL · qwen3.5:2b"
      timeoutMs: 2000
  - wait:
      screen:
        contains: "CLOUD · kimi-code:cloud"
      timeoutMs: 2000
  - snapshot: mixed_inventory
  - press: "down"
  - press: "enter"
  - wait:
      screen:
        contains: "Use Ollama Cloud?"
      timeoutMs: 2000
  - snapshot: cloud_consent
  - press: "enter"
  - wait:
      screen:
        contains: "Ollama 0.31.2-test · models"
      timeoutMs: 2000
  - wait:
      screen:
        notContains: "Use Ollama Cloud?"
      timeoutMs: 2000
  - press: "enter"
  - press: "down"
  - wait:
      screen:
        contains: "enter use"
      timeoutMs: 2000
  - press: "enter"
  - wait:
      screen:
        notContains: "Use Ollama Cloud?"
      timeoutMs: 2000
  - wait:
      screen:
        notContains: "Ollama 0.31.2-test · models"
      timeoutMs: 2000
  - wait:
      screen:
        contains: "kimi-code:cloud"
      timeoutMs: 2000
  - snapshot: cloud_selected
  - press: "ctrl+o"
  - wait:
      screen:
        contains: "Ollama 0.31.2-test · models"
      timeoutMs: 2000
  - press: "d"
  - wait:
      screen:
        contains: "Prompts leave this machine through Ollama."
      timeoutMs: 2000
  - snapshot: model_details
  - press: "esc"
  - wait:
      screen:
        contains: "Ollama 0.31.2-test · models"
      timeoutMs: 2000
  - press: "a"
  - wait:
      screen:
        contains: "Add Ollama model"
      timeoutMs: 2000
  - type: "tiny-code:latest"
  - press: "enter"
  - wait:
      screen:
        contains: "tiny-code:latest is available"
      timeoutMs: 3000
  - snapshot: pull_complete
  - press: "esc"
  - wait:
      screen:
        contains: "Ollama 0.31.2-test · models"
      timeoutMs: 2000
  - wait:
      screen:
        contains: "tiny-code:latest"
      timeoutMs: 2000
  - press: "a"
  - wait:
      screen:
        contains: "Add Ollama model"
      timeoutMs: 2000
  - type: "slow-code"
  - press: "enter"
  - wait:
      screen:
        contains: "25%"
      timeoutMs: 3000
  - snapshot: pull_running
  - press: "esc"
  - wait:
      screen:
        contains: "model download cancelled"
      timeoutMs: 3000
  - snapshot: pull_cancelled
  - press: "esc"
  - wait:
      screen:
        contains: "Ollama 0.31.2-test · models"
      timeoutMs: 2000
  - press: "esc"
  - wait:
      screen:
        contains: "Ask, @mention files, or type /help"
      timeoutMs: 2000

outcomes:
  - id: inventory_is_ollama_authoritative
    description: local and cloud entries come from the mixed Ollama inventory with a visible privacy boundary
    verify:
      snapshot:
        name: mixed_inventory
        mode: text
  - id: runtime_stats_are_visible
    description: model details expose source, context, capabilities, and the active cloud-consent boundary
    verify:
      snapshot:
        name: model_details
        mode: text
  - id: cloud_requires_exact_session_consent
    description: manual cloud selection defaults to cancellation and clearly explains the privacy boundary
    verify:
      snapshot:
        name: cloud_consent
        mode: text
  - id: cloud_can_be_selected_without_entering_auto_routing
    description: explicit confirmation pins the exact Ollama Cloud model for the current session
    verify:
      snapshot:
        name: cloud_selected
        mode: text
  - id: pull_progress_completes
    description: the Charm pull form reaches a durable success state and refreshes inventory
    verify:
      snapshot:
        name: pull_complete
        mode: text
  - id: pull_is_cancellable
    description: running pull progress can be cancelled without leaving background work
    verify:
      snapshot:
        name: pull_cancelled
        mode: text
