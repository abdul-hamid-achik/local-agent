version: 1
name: local_agent_tui_smoke

intent: |
  a user can launch the local-agent TUI, see the initial screen, and quit with ctrl+c.

target:
  cmd: ["./bin/local-agent"]
  cwd: "."
  env:
    HOME: "${projectRoot}/.glyphrun/tmp/home"
    LOCAL_AGENT_AGENTS_DIR: "${projectRoot}/.glyphrun/tmp/agents"
    OLLAMA_HOST: "http://127.0.0.1:11434"

preconditions:
  commands:
    - run: "rm -rf .glyphrun/tmp/home .glyphrun/tmp/agents && mkdir -p .glyphrun/tmp/home .glyphrun/tmp/agents && go build -o ./bin/local-agent ./cmd/local-agent"
      cwd: "."
      timeoutMs: 30000

steps:
  - wait:
      screen:
        contains: "LOCAL AGENT"
      timeoutMs: 5000
  - snapshot: launch
  - press: "ctrl+c"
  - wait:
      process:
        exitCode: 0
      timeoutMs: 3000

outcomes:
  - id: launch_snapshot_stable
    description: the normal-width welcome uses the committed honest local-first copy
    verify:
      snapshot:
        name: launch
        mode: text
  - id: welcome_visible
    description: the TUI renders its welcome screen
    verify:
      screen:
        contains: "LOCAL AGENT"
  - id: ctrl_c_quits
    description: ctrl+c exits the TUI cleanly
    verify:
      process:
        exitCode: 0
