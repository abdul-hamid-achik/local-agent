version: 1
name: local_agent_init

intent: |
  a user can run local-agent init in an empty project directory and create AGENT.md.

target:
  cmd: ["${projectRoot}/bin/local-agent", "init", "--force"]
  cwd: ".glyphrun/tmp/init-workdir"
  env:
    HOME: "${projectRoot}/.glyphrun/tmp/init-home"

preconditions:
  commands:
    - run: "rm -rf .glyphrun/tmp/init-workdir .glyphrun/tmp/init-home && mkdir -p .glyphrun/tmp/init-workdir .glyphrun/tmp/init-home && go build -o ./bin/local-agent ./cmd/local-agent"
      cwd: "."
      timeoutMs: 30000

steps:
  - wait:
      screen:
        contains: "AGENT.md created successfully."
      timeoutMs: 3000
  - wait:
      process:
        exitCode: 0
      timeoutMs: 2000

outcomes:
  - id: success_message_visible
    description: init reports that AGENT.md was created
    verify:
      screen:
        contains: "AGENT.md created successfully."
  - id: agent_file_created
    description: init creates AGENT.md in the target project directory
    verify:
      command:
        run: "test -s .glyphrun/tmp/init-workdir/AGENT.md"
  - id: exits_zero
    description: init exits successfully
    verify:
      process:
        exitCode: 0
