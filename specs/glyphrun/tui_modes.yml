version: 1
name: local_agent_tui_modes

intent: |
  Normal remains the quiet interactive default, Shift+Tab only changes
  authority, PLAN keeps rejected durable-goal saves inside their review,
  PLAN opens a read-only planning surface, and explicit `/goal <time>
  <prompt>` opens a bounded durable-goal review.

target:
  cmd: ["./bin/local-agent"]
  cwd: "."
  env:
    HOME: "${projectRoot}/.glyphrun/tmp/modes-home"
    LOCAL_AGENT_AGENTS_DIR: "${projectRoot}/.glyphrun/tmp/modes-agents"
    LOCAL_AGENT_REDUCED_MOTION: "1"
    OLLAMA_HOST: "http://127.0.0.1:1"

terminal:
  cols: 60
  rows: 20

preconditions:
  commands:
    - run: "rm -rf .glyphrun/tmp/modes-home .glyphrun/tmp/modes-agents && mkdir -p .glyphrun/tmp/modes-home/.config/local-agent .glyphrun/tmp/modes-agents && printf '%s\n' 'model:' '  auto_select: false' > .glyphrun/tmp/modes-home/.config/local-agent/config.yaml && go build -o ./bin/local-agent ./cmd/local-agent"
      cwd: "."
      timeoutMs: 30000

steps:
  - wait:
      screen:
        contains: "try: ollama serve"
      timeoutMs: 5000
  - wait:
      screen:
        contains: "qwen3.5:2b"
      timeoutMs: 3000
  - wait:
      screen:
        notContains: "NORMAL ·"
      timeoutMs: 2000
  - snapshot: normal_default
  - press: "shift+tab"
  - wait:
      screen:
        contains: "PLAN · qwen3.5:2b"
      timeoutMs: 2000
  - type: "/goal 30m ship a bounded durable migration"
  - wait:
      screen:
        notContains: "Commands"
      timeoutMs: 2000
  - press: "enter"
  - wait:
      screen:
        contains: "Save goal"
      timeoutMs: 2000
  - press: "enter"
  - wait:
      screen:
        contains: "PLAN is read-only"
      timeoutMs: 2000
  - wait:
      screen:
        contains: "Use AUTO"
      timeoutMs: 2000
  - snapshot: plan_goal_rejected_inline
  - press: "esc"
  - wait:
      screen:
        notContains: "Save goal"
      timeoutMs: 2000
  - type: "design a safe migration"
  - press: "enter"
  - wait:
      screen:
        contains: "Plan · 1/3"
      timeoutMs: 2000
  - snapshot: plan_read_only
  - press: "esc"
  - wait:
      screen:
        notContains: "Plan · 1/3"
      timeoutMs: 2000
  - press: "shift+tab"
  - wait:
      screen:
        contains: "AUTO · qwen3.5:2b"
      timeoutMs: 2000
  - wait:
      screen:
        notContains: "Goal ·"
      timeoutMs: 2000
  - snapshot: auto_mode
  - type: "/goal 30m ship a bounded durable migration"
  - wait:
      screen:
        notContains: "Commands"
      timeoutMs: 2000
  - press: "enter"
  - wait:
      screen:
        contains: "ship a bounded durable migration"
      timeoutMs: 2000
  - wait:
      screen:
        contains: "Save goal"
      timeoutMs: 2000
  - snapshot: explicit_goal_review
  - press: "ctrl+c"
  - wait:
      process:
        exitCode: 0
      timeoutMs: 3000

outcomes:
  - id: normal_is_interactive_default
    description: startup keeps Normal visually quiet while preserving the interactive authority
    verify:
      snapshot:
        name: normal_default
        mode: text
  - id: plan_remains_read_only_and_structured
    description: PLAN retains the bounded structured planning workflow
    verify:
      snapshot:
        name: plan_read_only
        mode: text
  - id: plan_goal_rejection_stays_in_review
    description: PLAN rejects a durable-goal save inline without dismissing or obscuring its reviewed form
    verify:
      snapshot:
        name: plan_goal_rejected_inline
        mode: text
  - id: auto_mode_does_not_open_goal_ui
    description: cycling to AUTO changes authority without opening or creating a goal
    verify:
      snapshot:
        name: auto_mode
        mode: text
  - id: explicit_goal_command_opens_bounded_review
    description: "`/goal <time> <prompt>` opens a prefilled review with only the requested time cap"
    verify:
      snapshot:
        name: explicit_goal_review
        mode: text
  - id: modes_flow_quits_cleanly
    description: ctrl+c exits cleanly from the AUTO goal form
    verify:
      process:
        exitCode: 0
