version: 1
name: local_agent_tui_narrow

intent: |
  a user can begin at the supported 30x12 minimum, then keep a full-width
  conversation at 40 columns while navigating nested settings, completion,
  runtime, and help modals before quitting cleanly.

target:
  cmd: ["./bin/local-agent"]
  cwd: "."
  env:
    HOME: "${projectRoot}/.glyphrun/tmp/narrow-home"
    LOCAL_AGENT_AGENTS_DIR: "${projectRoot}/.glyphrun/tmp/narrow-agents"
    OLLAMA_HOST: "http://127.0.0.1:11434"

terminal:
  cols: 80
  rows: 24

preconditions:
  commands:
    - run: "rm -rf .glyphrun/tmp/narrow-home .glyphrun/tmp/narrow-agents && mkdir -p .glyphrun/tmp/narrow-home .glyphrun/tmp/narrow-agents && go build -o ./bin/local-agent ./cmd/local-agent"
      cwd: "."
      timeoutMs: 30000

steps:
  - wait:
      screen:
        contains: "Ask, @mention files, or type /help"
      timeoutMs: 5000
  - resize:
      cols: 30
      rows: 12
  - wait:
      screen:
        contains: "Ctrl+P settings"
      timeoutMs: 2000
  - snapshot: minimum_idle
  - press: "ctrl+p"
  - wait:
      screen:
        contains: "Settings"
      timeoutMs: 2000
  - snapshot: minimum_settings
  - press: "esc"
  - resize:
      cols: 40
      rows: 20
  - wait:
      screen:
        contains: "LOCAL AGENT"
      timeoutMs: 2000
  - snapshot: narrow_compact
  - press: "ctrl+p"
  - wait:
      screen:
        contains: "Session Settings"
      timeoutMs: 2000
  - snapshot: narrow_settings
  - press: "down"
  - press: "down"
  - press: "enter"
  - wait:
      screen:
        contains: "Select Mode"
      timeoutMs: 2000
  - snapshot: narrow_mode
  - press: "esc"
  - wait:
      screen:
        contains: "Session Settings"
      timeoutMs: 2000
  - press: "down"
  - press: "down"
  - press: "down"
  - press: "enter"
  - wait:
      screen:
        contains: "Runtime Status"
      timeoutMs: 2000
  - snapshot: narrow_runtime
  - press: "esc"
  - wait:
      screen:
        contains: "Session Settings"
      timeoutMs: 2000
  - press: "esc"
  - wait:
      screen:
        contains: "Ctrl+P settings"
      timeoutMs: 2000
  - press: "/"
  - wait:
      screen:
        contains: "Commands"
      timeoutMs: 2000
  - snapshot: narrow_commands
  - press: "esc"
  - wait:
      screen:
        contains: "Ctrl+P settings"
      timeoutMs: 2000
  - press: "?"
  - wait:
      screen:
        contains: "Keyboard Shortcuts"
      timeoutMs: 2000
  - snapshot: narrow_help
  - press: "q"
  - press: "ctrl+c"
  - wait:
      process:
        exitCode: 0
      timeoutMs: 3000

outcomes:
  - id: minimum_terminal_is_usable
    description: the supported 30x12 terminal retains the primary prompt and settings path
    verify:
      snapshot:
        name: minimum_idle
        mode: text
  - id: minimum_settings_are_bounded
    description: settings remain navigable at the supported 30x12 minimum
    verify:
      snapshot:
        name: minimum_settings
        mode: text
  - id: narrow_conversation_is_directly_usable
    description: the conversation keeps the complete narrow terminal width without persistent chrome
    verify:
      snapshot:
        name: narrow_compact
        mode: text
  - id: responsive_settings_open
    description: session settings are reachable from the narrow composer
    verify:
      snapshot:
        name: narrow_settings
        mode: text
  - id: nested_mode_returns_to_settings
    description: a Settings child fits the narrow terminal and returns to the root palette
    verify:
      snapshot:
        name: narrow_mode
        mode: text
  - id: responsive_runtime_status_opens
    description: runtime status remains bounded and reachable from Settings
    verify:
      snapshot:
        name: narrow_runtime
        mode: text
  - id: responsive_completion_opens
    description: slash completion fits the supported 40-column terminal
    verify:
      snapshot:
        name: narrow_commands
        mode: text
  - id: responsive_help_opens
    description: help remains usable after the terminal is narrowed
    verify:
      snapshot:
        name: narrow_help
        mode: text
  - id: narrow_tui_quits_cleanly
    description: ctrl+c exits cleanly after the responsive flow
    verify:
      process:
        exitCode: 0
