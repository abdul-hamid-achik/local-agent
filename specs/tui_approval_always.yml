version: 1
contractHash: sha256:a0d7dbb0556022734f0d9ee89bbeb8ca28facae3c3674156d9dd3dcc08f49e02
name: local_agent_tui_approval_always
# Runner note (2026-07-16): a restricted sandbox can deny the wrapper's
# 127.0.0.1:0 listener before Local Agent starts. Glyphrun currently reports
# that immediate exit as a blank-screen timeout; CI and unrestricted runs pass.
# Keep this enabled and improve Glyphrun to surface target_exited plus stderr.
intent: |
    choosing the exact-request "session" decision reuses that grant only inside
    the current Agent process. A fresh local-agent process using the same HOME
    must prompt again, and no global allow policy may be persisted.
target:
    cmd:
        - "${projectRoot}/.glyphrun/tmp/fake-ollama-always"
        - "${projectRoot}/bin/local-agent"
        - "${projectRoot}/.glyphrun/tmp/approval-always-protocol.txt"
    cwd: "/tmp/local-agent-glyphrun-approval-always-workdir"
    env:
        HOME: "${projectRoot}/.glyphrun/tmp/approval-always-home"
        LOCAL_AGENT_AGENTS_DIR: "${projectRoot}/.glyphrun/tmp/approval-always-agents"
        LOCAL_AGENT_REDUCED_MOTION: "1"
terminal:
    cols: 90
    rows: 28
preconditions:
    commands:
        - run: "rm -rf .glyphrun/tmp/approval-always-home .glyphrun/tmp/approval-always-agents .glyphrun/tmp/approval-always-protocol.txt .glyphrun/tmp/fake-ollama-always /tmp/local-agent-glyphrun-approval-always-workdir && mkdir -p .glyphrun/tmp/approval-always-home/.config/local-agent .glyphrun/tmp/approval-always-agents /tmp/local-agent-glyphrun-approval-always-workdir && printf '%s\\n' 'model:' '  auto_select: false' 'ice:' '  enabled: false' > .glyphrun/tmp/approval-always-home/.config/local-agent/config.yaml && go build -o ./bin/local-agent ./cmd/local-agent && go build -o .glyphrun/tmp/fake-ollama-always ./specs/fixtures/fake_ollama_always"
          cwd: "."
          timeoutMs: 30000
steps:
    - wait:
        screen:
            contains: "Ask, @mention files, or type /help"
        timeoutMs: 5000
    - wait:
        screen:
            contains: "qwen3.5:0.8b"
        timeoutMs: 2000
    - type: "Write session-grant.txt with the exact text session scoped approval."
    - press: "enter"
    - wait:
        screen:
            contains: "Permission · write"
        timeoutMs: 5000
    - wait:
        screen:
            contains: "same/session"
        timeoutMs: 2000
    - snapshot: session_permission
    - press: "s"
    - wait:
        screen:
            contains: "Session approval recorded."
        timeoutMs: 5000
    - wait:
        screen:
            contains: "Ask, @mention files, or type /help"
        timeoutMs: 3000
    - type: "Write session-grant.txt again with the exact text session scoped approval."
    - press: "enter"
    - wait:
        screen:
            contains: "Session approval reused without another prompt."
        timeoutMs: 5000
    - wait:
        screen:
            notContains: "Permission · write"
        timeoutMs: 2000
    - press: "ctrl+c"
    - wait:
        screen:
            notContains: "Session approval reused without another prompt."
        timeoutMs: 5000
    - wait:
        screen:
            contains: "qwen3.5:0.8b"
        timeoutMs: 5000
    - type: "Write session-grant.txt with the exact text session scoped approval."
    - press: "enter"
    - wait:
        screen:
            contains: "Permission · write"
        timeoutMs: 5000
    - wait:
        screen:
            contains: "y once"
        timeoutMs: 2000
    - snapshot: restart_permission
    - press: "y"
    - wait:
        screen:
            contains: "Restart required a fresh approval."
        timeoutMs: 5000
    - press: "ctrl+c"
    - wait:
        process:
            exitCode: 0
        timeoutMs: 5000
outcomes:
    - id: session_approval_runs
      description: the explicitly session-approved exact write executes
      verify:
        command:
            run: "test \"$(cat /tmp/local-agent-glyphrun-approval-always-workdir/session-grant.txt)\" = 'session scoped approval'"
    - id: session_permission_is_reviewed
      description: the first prompt exposes the exact-request session decision
      verify:
        snapshot:
            name: session_permission
            mode: text
    - id: exact_request_reuses_inside_agent
      description: the identical request reuses the grant inside the first Agent process without another permission request
      verify:
        command:
            run: "grep -q '^approval_session_receipts=2$' .glyphrun/tmp/approval-always-protocol.txt"
    - id: restart_requires_fresh_permission
      description: the second Agent process prompts again for the identical request
      verify:
        snapshot:
            name: restart_permission
            mode: text
    - id: fake_provider_observed_all_receipts
      description: all three writes completed with one tool receipt apiece and no global allow row
      verify:
        command:
            run: "grep -q '^protocol_ok=true$' .glyphrun/tmp/approval-always-protocol.txt"
    - id: both_processes_quit_cleanly
      description: the wrapper and both local-agent processes exit successfully
      verify:
        process:
            exitCode: 0
