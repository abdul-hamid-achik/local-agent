version: 1
contractHash: sha256:f0a7b0a41b82d327f04fb3c1debfc599f3cd236cf43b949a397b701fabb71eb3
name: local_agent_live_ollama_tool

intent: |
  an installed small local Qwen model can call exactly one built-in read tool through the headless harness and return its result without cloud inference.

target:
  cmd:
    - "${projectRoot}/bin/local-agent"
    - "-model"
    - "qwen3.5:0.8b"
    - "--skip-approvals"
    - "-p"
    - "Use the read_file tool exactly once to read probe.txt. Do not use bash or any other tool. Then reply with only the exact file contents and no explanation."
  cwd: "testdata/live_ollama"
  env:
    HOME: "${projectRoot}/.glyphrun/tmp/live-ollama-home"
    OLLAMA_HOST: "http://127.0.0.1:11434"

terminal:
  cols: 100
  rows: 30

preconditions:
  commands:
    - run: "rm -rf .glyphrun/tmp/live-ollama-home && mkdir -p .glyphrun/tmp/live-ollama-home && go build -o ./bin/local-agent ./cmd/local-agent"
      cwd: "."
      timeoutMs: 30000

steps:
  - wait:
      screen:
        contains: "read path="
      timeoutMs: 30000
  - wait:
      screen:
        contains: "LOCAL_TOOL_PROBE_OK_7E31"
      timeoutMs: 30000
  - wait:
      process:
        exitCode: 0
      timeoutMs: 10000

outcomes:
  - id: local_read_tool_dispatched
    description: the Qwen response performs the requested built-in read operation
    verify:
      screen:
        contains: "read path="
  - id: exact_tool_result_returned
    description: the assistant returns the exact local fixture value
    verify:
      screen:
        contains: "LOCAL_TOOL_PROBE_OK_7E31"
  - id: headless_turn_completes
    description: the local tool turn exits successfully
    verify:
      process:
        exitCode: 0
